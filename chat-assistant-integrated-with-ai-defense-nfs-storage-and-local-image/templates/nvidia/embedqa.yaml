{{- if .Values.nvidia.enabled }}
{{- if and (not .Values.nvidia.embedqaLocalModelPath) (not .Values.nvidia.embedqaProfile) (not .Values.ngc.apiKey) }}
{{ fail "embedqa needs nvidia.embedqaLocalModelPath, nvidia.embedqaProfile, or ngc.apiKey set. With none of these, NIM_MODEL_PROFILE is omitted and the image falls back to its own NGC hub/org lookup at startup — on a truly air-gapped network that call can't even resolve, so the pod hangs/crash-loops instead of failing fast. embedqaLocalModelPath's mechanism is UNVERIFIED for this specific component (see the env var comment below) — ngc.apiKey remains the safer default here until that's confirmed live." }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedqa
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
    app: embedqa
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: embedqa
  template:
    metadata:
      labels:
        app: embedqa
        gpu-workload: "true"
        {{- include "chat-assistance.labels" . | nindent 8 }}
    spec:
      {{- include "chat-assistance.nodeSelector" . | nindent 6 }}
      {{- include "chat-assistance.nimAntiAffinity" . | nindent 6 }}
      {{- /* See llama.yaml's imagePullSecrets comment — same fix, decoupled
      from ngc.apiKey so satisfying the fail-fast guard via apiKey alone
      doesn't suppress the SA's auto-injected internal-registry credential. */}}
      {{- if .Values.ngc.ncrImagePull }}
      imagePullSecrets:
        - name: ncr-registry-secret
      {{- end }}
      containers:
        - name: embedqa
          image: {{ .Values.images.embedqa }}
          ports:
            - containerPort: 8000
          env:
            # See llama.yaml's NIM_CACHE_PATH comment — must match the
            # nim-cache mount below.
            - name: NIM_CACHE_PATH
              value: "/opt/nim/.cache"
            {{- if .Values.nvidia.embedqaLocalModelPath }}
            # UNVERIFIED: unlike llama/content/topicControl (confirmed
            # nim_llm_sdk-based), embedqa's actual backend hasn't been
            # inspected — it may behave like nvclip in the insurguard chart
            # (unconditional NGC auth regardless of cache) rather than
            # honoring NIM_MODEL_NAME. Confirm via a live pod's logs/source
            # before relying on this — see llama.yaml's comment for the
            # mechanism this assumes.
            - name: NIM_MODEL_NAME
              value: {{ .Values.nvidia.embedqaLocalModelPath | quote }}
            {{- else if .Values.nvidia.embedqaProfile }}
            - name: NIM_MODEL_PROFILE
              value: {{ .Values.nvidia.embedqaProfile | quote }}
            {{- end }}
            - name: NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ngc-api-secret
                  key: api-key
            - name: NIM_NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ngc-api-secret
                  key: api-key
          resources:
            {{- include "chat-assistance.resources.nvidia" . | nindent 12 }}
          securityContext:
            {{- include "chat-assistance.securityContext" . | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /v1/health/ready
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /v1/health/live
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
          volumeMounts:
            - name: nim-cache
              mountPath: /opt/nim/.cache
      volumes:
        - name: nim-cache
          persistentVolumeClaim:
            claimName: nim-cache-embedqa
---
apiVersion: v1
kind: Service
metadata:
  name: embedqa
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
spec:
  ports:
    - name: nim
      port: 8000
      targetPort: 8000
    # Also serve on port 80 for portless-URL access (consistency with the other NIMs).
    - name: http
      port: 80
      targetPort: 8000
  selector:
    app: embedqa
{{- end }}
