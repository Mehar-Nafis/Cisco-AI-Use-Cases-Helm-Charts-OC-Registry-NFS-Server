{{- if .Values.nvidia.enabled }}
{{- if and (not .Values.nvidia.contentLocalModelPath) (not .Values.nvidia.contentProfile) (not .Values.ngc.apiKey) }}
{{ fail "content needs nvidia.contentLocalModelPath, nvidia.contentProfile, or ngc.apiKey set. With none of these, NIM_MODEL_PROFILE is omitted and the image falls back to its own NGC hub/org lookup at startup — on a truly air-gapped network that call can't even resolve, so the pod hangs/crash-loops instead of failing fast. localModelPath is the recommended fix (skips NGC entirely, see its values.yaml comment); ngc.apiKey is also now required for the NGC_API_KEY env var and imagePullSecret this template references below when set." }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: content
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
    app: content
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: content
  template:
    metadata:
      labels:
        app: content
        gpu-workload: "true"
        {{- include "chat-assistance.labels" . | nindent 8 }}
    spec:
      {{- include "chat-assistance.nodeSelector" . | nindent 6 }}
      {{- include "chat-assistance.nimAntiAffinity" . | nindent 6 }}

      {{- /* See llama.yaml's imagePullSecrets comment — same fix, decoupled
      from ngc.apiKey so satisfying the fail-fast guard via apiKey alone
      doesn't suppress the SA's auto-injected internal-registry credential. */}}
      {{- if .Values.ngc.ncrImagePull }}
      imagePullSecrets:
        - name: ncr-registry-secret
      {{- end }}
      initContainers:
        - name: wait-for-llama
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for llama to be ready..."
              until wget -q -O /dev/null http://llama:8000/v1/health/ready 2>/dev/null; do
                echo "llama not ready, sleeping 30s..."
                sleep 30
              done
              echo "llama is ready, starting content NIM."
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
      containers:
        - name: content
          image: {{ .Values.images.content }}
          ports:
            - containerPort: 8000
          env:
            # See llama.yaml's NIM_CACHE_PATH comment — must match the
            # nim-cache mount below.
            - name: NIM_CACHE_PATH
              value: "/opt/nim/.cache"
            - name: NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ngc-api-secret
                  key: api-key
            - name: NIM_NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ngc-api-secret
                  key: api-key
            {{- if .Values.nvidia.contentLocalModelPath }}
            # See llama.yaml's llamaLocalModelPath comment for the full
            # explanation — same nim_llm_sdk NGC-free local-load branch.
            - name: NIM_MODEL_NAME
              value: {{ .Values.nvidia.contentLocalModelPath | quote }}
            {{- else if .Values.nvidia.contentProfile }}
            - name: NIM_MODEL_PROFILE
              value: {{ .Values.nvidia.contentProfile | quote }}
            {{- end }}
            - name: NIM_MAX_NUM_SEQS
              value: {{ .Values.nvidia.maxNumSeqs | default "2" | quote }}
            # NIM_KVCACHE_PERCENT removed — vLLM-specific; crashes TRT-LLM auto-selected profiles
          resources:
            {{- include "chat-assistance.resources.nvidia" . | nindent 12 }}
          securityContext:
            {{- include "chat-assistance.securityContext" . | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /v1/health/ready
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /v1/health/live
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 30
          volumeMounts:
            - name: nim-cache
              mountPath: /opt/nim/.cache
      volumes:
        - name: nim-cache
          persistentVolumeClaim:
            claimName: nim-cache-content
---
apiVersion: v1
kind: Service
metadata:
  name: content
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
spec:
  ports:
    - name: nim
      port: 8000
      targetPort: 8000
    # Also serve on port 80 so a portless URL (e.g. AI Defense forwarding to
    # http://content.chat-assistant.svc.cluster.local) reaches the NIM on 8000.
    - name: http
      port: 80
      targetPort: 8000
  selector:
    app: content
{{- end }}
