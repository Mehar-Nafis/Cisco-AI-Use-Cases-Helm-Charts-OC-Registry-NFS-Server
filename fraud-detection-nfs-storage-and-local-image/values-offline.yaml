# ============================================================================
# FRAUD-DETECTION FAILOVER OVERLAY
# Apply on top of values.yaml when the in-cluster mirror (nim-mirror
# namespace in the OpenShift internal registry — this chart's default, see
# values.yaml) is unavailable:
#   helm upgrade fraud-detection . -f values.yaml -f values-offline.yaml \
#     --set ngcApiKey=<YOUR_NGC_KEY> -n fraud-detection
#
# Repoints the one nvcr.io-sourced image (tritonBase) at the GitLab
# Container Registry on the 1 TB box — a second, independent copy kept
# outside the cluster. Registry = 198.18.134.23:5050, project =
# root/model-images (self-signed / plain HTTP). Same pattern as the
# insurguard chart's values-offline.yaml.
#
# Custom-built images (backend, frontend, morpheusPipeline, nimLLM, etc.)
# are not covered — those come from global.imageRegistry, a different
# concern from this NVIDIA-sourced image.
# ============================================================================
images:
  tritonBase:
    registry: 198.18.134.23:5050/root/model-images
