{{- if and .Values.global.airGapped (gt (int .Values.gpu.nimCount) 0) (not .Values.nimLlm.localModelPath) (not .Values.ngcApiKey) }}
{{ fail "nim-llm needs either nimLlm.localModelPath or ngcApiKey set when gpu.nimCount > 0 and global.airGapped is true. With neither, this Deployment references the ngc-secret Secret (see templates/secrets.yaml), which is only created when ngcApiKey is set — without it, the pod fails outright on a missing secret reference instead of a clear error at render time. localModelPath is the recommended fix: set it to the absolute in-container path (under NIM_CACHE_PATH=/tmp/nim-cache, now backed by the nim-cache PVC below instead of the previous emptyDir) of an already-downloaded HF-format model snapshot — see the NIM_MODEL_NAME comment below for the mechanism this assumes (best-effort: this image is a custom-tagged rebuild, cisco_fraud_detection:nim_llm, not confirmed nim_llm_sdk-based the way insurguard/vss-helm/chat-assistant's identical nvcr.io NIM images were). Set global.airGapped: false if you actually intend to rely on live NGC access instead." }}
{{- end }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nim-cache
  annotations:
    # Pins this PVC to a fixed NFS subdirectory name (understood by
    # nfs-subdir-external-provisioner, see values-storage-nfs.yaml) so
    # deleting/recreating the PVC always rebinds to the same on-disk data —
    # without it, the provisioner falls back to a name embedding the
    # auto-generated PV name, which differs every time. Harmless when not
    # using the nfs-client StorageClass. Matches the insurguard chart's
    # identical pattern.
    nfs.io/storage-path: "fraud-detection-nim-cache"
  labels:
    {{- include "fraud-detection.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.persistence.nimCache }}
  {{- with .Values.persistence.modelCacheStorageClassName }}
  storageClassName: {{ . }}
  {{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nim-hf-cache
  annotations:
    nfs.io/storage-path: "fraud-detection-nim-hf-cache"
  labels:
    {{- include "fraud-detection.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.persistence.nimHfCache }}
  {{- with .Values.persistence.modelCacheStorageClassName }}
  storageClassName: {{ . }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nim-llm
  labels:
    {{- include "fraud-detection.labels" . | nindent 4 }}
    {{- include "fraud-detection.selectorLabels" (dict "component" "nim-llm") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "fraud-detection.selectorLabels" (dict "component" "nim-llm") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fraud-detection.labels" . | nindent 8 }}
        {{- include "fraud-detection.selectorLabels" (dict "component" "nim-llm") | nindent 8 }}
    spec:
      {{- include "fraud-detection.nodeSelector" . | nindent 6 }}
      {{- include "fraud-detection.imagePullSecrets" . | nindent 6 }}
      {{- include "fraud-detection.podSecurityContext" . | nindent 6 }}
      containers:
      - name: nim-llm
        image: "{{ .Values.global.imageRegistry }}/{{ .Values.images.nimLLM.repository }}:{{ .Values.images.nimLLM.tag }}"
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        {{- include "fraud-detection.containerSecurityContext" . | nindent 8 }}
        env:
        {{- /* Confirmed live: this was previously gated only on
        gpu.nimCount > 0, not on whether ngcApiKey was actually set — the
        fail-fast guard above allows localModelPath alone to satisfy it,
        but this env var still unconditionally referenced ngc-secret, which
        templates/secrets.yaml only creates when ngcApiKey is non-empty.
        Result: CreateContainerConfigError (missing secret) on any
        localModelPath-only, no-ngcApiKey deploy — the exact air-gapped
        case this whole guard exists to support. Only nim-llm consumes
        ngc-secret in this chart, so gating the reference itself (rather
        than making the chart create an unneeded empty secret) is the
        cleaner fix. */}}
        {{- if and (gt (int .Values.gpu.nimCount) 0) .Values.ngcApiKey }}
        - name: NGC_API_KEY
          valueFrom:
            secretKeyRef:
              name: ngc-secret
              key: NGC_API_KEY
        {{- end }}
        {{- if .Values.nimLlm.localModelPath }}
        # Best-effort: this image (cisco_fraud_detection:nim_llm) is a
        # custom-tagged rebuild, not confirmed to be nim_llm_sdk-based the
        # way insurguard/vss-helm/chat-assistant's identical nvcr.io NIM
        # images were (that confirmation came from reading
        # nim_llm_sdk.hub.ngc_injector.inject_ngc_hub's source directly out
        # of a running pod of THIS chart's NIM). If it is the same SDK
        # family, NIM_MODEL_NAME pointed at an already-downloaded local
        # snapshot dir (under NIM_CACHE_PATH, now PVC-backed below) skips
        # the manifest/NGC lookup entirely. Verify via that same live-pod
        # source-inspection method before trusting this.
        - name: NIM_MODEL_NAME
          value: {{ .Values.nimLlm.localModelPath | quote }}
        {{- end }}
        - name: NIM_GPU_MEMORY_UTILIZATION
          value: "0.5"
        - name: NIM_CACHE_PATH
          value: "/tmp/nim-cache"
        - name: HOME
          value: "/tmp/home"
        - name: HF_HOME
          value: "/tmp/hf-cache"
        - name: TRANSFORMERS_CACHE
          value: "/tmp/hf-cache"
        {{- if .Values.global.airGapped }}
        # Only forced when global.airGapped is true, matching this chart's
        # own intent toggle (see the fail-fast guard above) — someone who
        # sets airGapped: false to intentionally rely on live NGC/HF access
        # shouldn't have that silently blocked. This image's actual
        # framework isn't confirmed (see the NIM_MODEL_NAME comment above),
        # so these are set defensively rather than waiting to hit the same
        # failures confirmed live elsewhere this session — HF_HUB_OFFLINE/
        # TRANSFORMERS_OFFLINE prevent any accidental live HF calls if this
        # is transformers-based. If it isn't, an unrecognized env var is
        # simply ignored.
        - name: HF_HUB_OFFLINE
          value: "1"
        - name: TRANSFORMERS_OFFLINE
          value: "1"
        {{- end }}
        # Unconditional: pure telemetry opt-out, never blocks legitimate
        # model access either way. Prevents vLLM's usage-stats thread from
        # crashing on a permission error the way it did in vss-helm's
        # via-server, if this image is vLLM-based.
        - name: VLLM_NO_USAGE_STATS
          value: "1"
        ports:
        - containerPort: 8000
          name: http
        volumeMounts:
        - name: nim-cache
          mountPath: /tmp/nim-cache
        - name: nim-home
          mountPath: /tmp/home
        - name: nim-tmp
          mountPath: /tmp/hf-cache
        {{- if gt (int .Values.gpu.nimCount) 0 }}
        resources:
          limits:
            nvidia.com/gpu: {{ .Values.gpu.nimCount }}
        {{- end }}
        readinessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 300
          periodSeconds: 15
          failureThreshold: 20
        livenessProbe:
          tcpSocket:
            port: 8000
          # Confirmed live: a genuine cold NGC download (profile selection
          # to engine launch) took ~213s, right up against the previous
          # 180s initialDelaySeconds + 3-failure default tolerance (~225s
          # total) — this pod got killed and restarted mid-download on one
          # actual run. Widened with real headroom, same class of fix as
          # vss-helm's nim-llm probe tuning (that one started even more
          # undersized, at the opposite extreme of 900s before being
          # deliberately shortened once localModelPath made warm restarts
          # fast — this chart doesn't have that bypass confirmed yet, so
          # staying generous here rather than guessing a tight number).
          initialDelaySeconds: 600
          periodSeconds: 30
          failureThreshold: 20
      volumes:
      - name: nim-cache
        persistentVolumeClaim:
          claimName: nim-cache
      - name: nim-home
        emptyDir: {}
      - name: nim-tmp
        persistentVolumeClaim:
          claimName: nim-hf-cache
---
apiVersion: v1
kind: Service
metadata:
  name: nim-llm
  labels:
    {{- include "fraud-detection.labels" . | nindent 4 }}
spec:
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  - port: 80
    targetPort: 8000
    name: http-default
  selector:
    {{- include "fraud-detection.selectorLabels" (dict "component" "nim-llm") | nindent 4 }}
