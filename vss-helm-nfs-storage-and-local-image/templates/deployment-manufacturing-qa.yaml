{{- $fullname := include "vss.fullname" . }}
{{- $component := "manufacturing-qa" }}
{{- if .Values.manufacturingQa.image }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-{{ $component }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vss.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "vss.selectorLabels" (dict "root" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "vss.selectorLabels" (dict "root" . "component" $component) | nindent 8 }}
    spec:
      serviceAccountName: {{ include "vss.serviceAccountName" . }}
      {{- include "vss.nodeSelector" . | nindent 6 }}
      {{- include "vss.primaryAffinity" . | nindent 6 }}
      {{- include "vss.podSecurityContext" . | nindent 6 }}
      initContainers:
        - name: seed-app-data
          image: {{ .Values.manufacturingQa.image }}
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "cp -rn /app/storage/. /mnt/storage/ 2>/dev/null || true; cp -rn /app/videos/. /mnt/videos/ 2>/dev/null || true"]
          volumeMounts:
            - name: app-storage
              mountPath: /mnt/storage
            - name: app-videos
              mountPath: /mnt/videos
      containers:
        - name: manufacturing-qa
          image: {{ .Values.manufacturingQa.image }}
          imagePullPolicy: IfNotPresent
          securityContext:
            {{- include "vss.containerSecurityContext" . | nindent 12 }}
          ports:
            - containerPort: {{ .Values.manufacturingQa.appPort | int }}
              name: gradio
          envFrom:
            - configMapRef:
                name: {{ $fullname }}-manufacturing-qa-env
          env:
            - name: MEDIA_BASE_DIR
              value: "/tmp"
            # Gradio's own internal file-response cache defaults to
            # /tmp/gradio/<hash>/ — but /tmp here is the shared-media PVC,
            # whose existing content was written by an earlier pod
            # generation under a different random UID (restricted-v2, no
            # fsGroup). The current UID can't mkdir there. Confirmed live:
            # selecting a video preset threw PermissionError creating
            # /tmp/gradio/... inside Gradio's save_file_to_cache, which is
            # why every preset-populated field rendered as "Error". Point
            # Gradio's cache at a plain emptyDir instead — MEDIA_BASE_DIR
            # keeps using the shared PVC for actual media handoff with
            # via-server, unaffected.
            - name: GRADIO_TEMP_DIR
              value: "/gradio-tmp"
          resources:
            {{- toYaml .Values.manufacturingQa.resources | nindent 12 }}
          volumeMounts:
            - name: shared-media
              mountPath: /tmp
            - name: app-storage
              mountPath: /app/storage
            - name: app-videos
              mountPath: /app/videos
            - name: gradio-tmp
              mountPath: /gradio-tmp
      volumes:
        - name: shared-media
          persistentVolumeClaim:
            claimName: {{ $fullname }}-vss-shared-media
        - name: app-storage
          emptyDir: {}
        - name: app-videos
          emptyDir: {}
        - name: gradio-tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-{{ $component }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vss.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  selector:
    {{- include "vss.selectorLabels" (dict "root" . "component" $component) | nindent 4 }}
  ports:
    - name: gradio
      port: {{ .Values.manufacturingQa.appPort | int }}
      targetPort: gradio
{{- end }}
