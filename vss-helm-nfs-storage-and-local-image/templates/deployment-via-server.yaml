{{- $fullname := include "vss.fullname" . }}
{{- $component := "via-server" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-{{ $component }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vss.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "vss.selectorLabels" (dict "root" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "vss.selectorLabels" (dict "root" . "component" $component) | nindent 8 }}
    spec:
      serviceAccountName: {{ include "vss.serviceAccountName" . }}
      {{- include "vss.nodeSelector" . | nindent 6 }}
      {{- include "vss.primaryAffinity" . | nindent 6 }}
      hostIPC: {{ .Values.viaServer.hostIPC }}
      {{- /* REVERTED from vss.anyuidPodSecurityContext + runAsUser:0 (see
      git history / prior comment here) — confirmed live that was wrong for
      this component specifically: with root forced, this pod (sharing the
      RWO shared-media PVC at /tmp with itself across pod generations, same
      node) failed on /tmp/pids.txt, /tmp/via-logs/*, and a sqlite DB under
      /tmp — a UID/SELinux-label mismatch against content an earlier,
      non-root pod generation had already written there, not a real "needs
      root" requirement. The default (non-anyuid) security context plus
      HOME=/tmp below was already sufficient — confirmed by a pod running
      fine under exactly that combination. Only storage-ms actually needs
      the anyuid/root treatment; the chart's original comment grouping both
      together was only half right. */}}
      {{ include "vss.podSecurityContext" . | nindent 6 }}
      containers:
        - name: via-server
          image: {{ .Values.viaServer.image }}
          imagePullPolicy: IfNotPresent
          securityContext:
            {{- include "vss.containerSecurityContext" . | nindent 12 }}
          ports:
            - containerPort: {{ .Values.viaServer.backendPort }}
              name: backend
            - containerPort: {{ .Values.viaServer.frontendPort }}
              name: frontend
          env:
            # Without this, $HOME resolves empty under OpenShift's random
            # non-root UID, and flashinfer (vLLM's CUDA JIT layer) tries to
            # write its workspace to $HOME/.cache -> "/.cache" (root-owned,
            # unwritable) -> PermissionError, confirmed from this pod's own
            # crash logs. /tmp is already writable (shared-media PVC mounted
            # there below).
            - name: HOME
              value: "/tmp"
            # vLLM's own usage-stats telemetry thread tries to write
            # ~/.config/vllm/usage_stats.json — with HOME=/tmp above (same
            # shared-media PVC, same ownership mismatch that motivated
            # HOME=/tmp in the first place), that hits the identical
            # PermissionError, confirmed from this pod's own crash logs
            # (EngineCore_DP0 _report_usage_worker). Unlike flashinfer's
            # cache, this thread isn't needed for the app to function —
            # it's outbound usage telemetry, which also has no business
            # phoning home on an air-gapped cluster. Disabling it removes
            # both problems at once.
            - name: VLLM_NO_USAGE_STATS
              value: "1"
            - name: BACKEND_PORT
              value: {{ .Values.viaServer.backendPort | quote }}
            - name: FRONTEND_PORT
              value: {{ .Values.viaServer.frontendPort | quote }}
            - name: DISABLE_CA_RAG
              value: "true"
            - name: DISABLE_FRONTEND
              value: "true"
            - name: DISABLE_GUARDRAILS
              value: "true"
            - name: DISABLE_CV_PIPELINE
              value: "true"
            - name: MODEL_PATH
              value: {{ .Values.viaServer.modelPath | quote }}
            - name: VLM_MODEL_TO_USE
              value: {{ .Values.viaServer.vlmModelToUse | quote }}
            - name: VLLM_GPU_MEMORY_UTILIZATION
              value: {{ .Values.viaServer.vllmGpuMemoryUtilization | quote }}
            - name: VLM_MAX_MODEL_LEN
              value: {{ .Values.viaServer.vlmMaxModelLen | quote }}
            - name: VLM_INPUT_WIDTH
              value: {{ .Values.viaServer.vlmInputWidth | quote }}
            - name: VLM_INPUT_HEIGHT
              value: {{ .Values.viaServer.vlmInputHeight | quote }}
            - name: VLM_DEFAULT_NUM_FRAMES_PER_CHUNK
              value: {{ .Values.viaServer.vlmDefaultNumFramesPerChunk | quote }}
            - name: VLM_SYSTEM_PROMPT
              value: {{ .Values.viaServer.vlmSystemPrompt | quote }}
            - name: VSS_LOG_LEVEL
              value: {{ .Values.viaServer.vssLogLevel | quote }}
            - name: VSS_EXTRA_ARGS
              value: {{ .Values.viaServer.vssExtraArgs | quote }}
            - name: ALERT_REVIEW_MEDIA_BASE_DIR
              value: "/tmp"
            - name: NVIDIA_VISIBLE_DEVICES
              value: {{ .Values.global.nvidiaVisibleDevices | quote }}
            - name: NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-credentials
                  key: NGC_API_KEY
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-credentials
                  key: HF_TOKEN
            - name: NGC_MODEL_CACHE
              value: "/tmp/ngc_cache"
          resources:
            {{- toYaml .Values.viaServer.resources | nindent 12 }}
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: ngc-model-cache
              mountPath: /root/.via/ngc_model_cache
            - name: hf-cache
              mountPath: /tmp/huggingface
            - name: shared-media
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /health/live
              port: {{ .Values.viaServer.backendPort }}
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 20
            failureThreshold: 25
          readinessProbe:
            httpGet:
              path: /health/live
              port: {{ .Values.viaServer.backendPort }}
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 20
            failureThreshold: 25
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.viaServer.shmSize }}
        - name: ngc-model-cache
          persistentVolumeClaim:
            claimName: {{ $fullname }}-via-ngc-model-cache
        - name: hf-cache
          persistentVolumeClaim:
            claimName: {{ $fullname }}-via-hf-cache
        - name: shared-media
          persistentVolumeClaim:
            claimName: {{ $fullname }}-vss-shared-media
