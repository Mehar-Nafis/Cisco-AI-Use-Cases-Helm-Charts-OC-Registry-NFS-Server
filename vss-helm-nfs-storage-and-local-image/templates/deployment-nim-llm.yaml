{{- $fullname := include "vss.fullname" . }}
{{- $component := "nim-llm" }}
{{- if and (not .Values.nimLlm.localModelPath) (not .Values.global.ngcApiKey) }}
{{ fail "nim-llm needs either nimLlm.localModelPath or global.ngcApiKey set. With neither, NIM_MODEL_NAME is omitted and the image falls back to its own NGC hub/manifest lookup at startup — on a truly air-gapped network that call can't even resolve, so the pod hangs/crash-loops instead of failing fast. localModelPath is the recommended fix (skips NGC entirely, confirmed by reading nim_llm_sdk source on this exact image in the insurguard chart) — see its values.yaml comment for how to find the real snapshot path." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-{{ $component }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vss.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "vss.selectorLabels" (dict "root" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "vss.selectorLabels" (dict "root" . "component" $component) | nindent 8 }}
    spec:
      serviceAccountName: {{ include "vss.serviceAccountName" . }}
      {{- /* CORRECTED: this was previously tied to global.ngcApiKey, which
      conflated two unrelated things — ngcApiKey is about nim-llm's own
      RUNTIME NGC calls (env vars), not image pulls. Confirmed live: with
      ngcApiKey set, this injected a non-empty imagePullSecrets pointing at
      an nvcr.io-only credential (useless once the image comes from
      nim-mirror) — and a NON-EMPTY imagePullSecrets list suppresses
      OpenShift's automatic injection of the ServiceAccount's own
      internal-registry credential (the one that actually works here, since
      vss-sa already has cross-namespace pull access to nim-mirror granted
      via `oc policy add-role-to-user system:image-puller
      system:serviceaccount:vss:vss-sa -n nim-mirror`). Result: "manifest
      ... authentication required" pull failures, while every other pod in
      this chart — all with EMPTY imagePullSecrets — pulled from the same
      nim-mirror namespace with no issue. Fixed: only inject this nvcr.io
      pull secret if nimLlm.image is explicitly overridden back to a raw
      nvcr.io/... path (nimLlm.ngcImagePull, default false) — matches the
      insurguard chart's ngcImagePull.enabled pattern exactly, for the same
      reason. */}}
      {{- if .Values.nimLlm.ngcImagePull }}
      imagePullSecrets:
        - name: {{ $fullname }}-ngc-registry
      {{- end }}
      {{- include "vss.nodeSelector" . | nindent 6 }}
      {{- include "vss.secondaryAffinity" . | nindent 6 }}
      {{- include "vss.podSecurityContext" . | nindent 6 }}
      containers:
        - name: nim-llm
          securityContext:
            {{- include "vss.containerSecurityContext" . | nindent 12 }}
          image: {{ .Values.nimLlm.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.nimLlm.containerPort }}
              name: http
          env:
            # Must match modelDirectory below — this is the image's own
            # default (confirmed live via `env` inside a running pod), made
            # explicit here so the mount path and the SDK's actual cache
            # path can never silently drift apart again the way they did
            # before this was discovered (PVC was mounted at /models, which
            # nim_llm_sdk never wrote to; real downloads landed in
            # NIM_CACHE_PATH's default, /opt/nim/.cache, on the container's
            # ephemeral overlay filesystem instead).
            - name: NIM_CACHE_PATH
              value: {{ default "/opt/nim/.cache" .Values.nimLlm.modelDirectory | quote }}
            {{- if .Values.nimLlm.localModelPath }}
            # Points nim_llm_sdk.hub.ngc_injector.inject_ngc_hub at an
            # already-downloaded local snapshot dir (under nim-model-cache's
            # mount at .Values.nimLlm.modelDirectory) — takes the early
            # branch that loads straight from disk, skipping the
            # manifest/NGC profile lookup entirely. Confirmed (on this same
            # NIM image, meta/llama-3.1-8b-instruct:1.8.6, in the insurguard
            # chart) by reading inject_ngc_hub's source directly out of a
            # running pod.
            - name: NIM_MODEL_NAME
              value: {{ .Values.nimLlm.localModelPath | quote }}
            {{- end }}
            - name: NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-credentials
                  key: NGC_API_KEY
            - name: UCX_TLS
              value: "tcp"
            - name: NCCL_IB_DISABLE
              value: "1"
          resources:
            {{- toYaml .Values.nimLlm.resources | nindent 12 }}
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: nim-model-cache
              mountPath: {{ default "/opt/nim/.cache" .Values.nimLlm.modelDirectory }}
          livenessProbe:
            exec:
              command:
                - python3
                - -c
                - "import requests; requests.get('http://localhost:{{ .Values.nimLlm.containerPort }}/v1/health/ready')"
            initialDelaySeconds: 900
            periodSeconds: 30
            timeoutSeconds: 20
            failureThreshold: 100
          readinessProbe:
            exec:
              command:
                - python3
                - -c
                - "import requests; requests.get('http://localhost:{{ .Values.nimLlm.containerPort }}/v1/health/ready')"
            initialDelaySeconds: 900
            periodSeconds: 30
            timeoutSeconds: 20
            failureThreshold: 100
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.nimLlm.shmSize }}
        - name: nim-model-cache
          persistentVolumeClaim:
            claimName: {{ $fullname }}-nim-model-cache
