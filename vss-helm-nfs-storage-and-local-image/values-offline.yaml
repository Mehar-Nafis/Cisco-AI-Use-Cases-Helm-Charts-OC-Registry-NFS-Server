# ============================================================================
# VSS-HELM FAILOVER OVERLAY
# Apply on top of values.yaml when the in-cluster mirror (nim-mirror
# namespace in the OpenShift internal registry — this chart's default, see
# values.yaml) is unavailable:
#   helm upgrade vss . -f values.yaml -f values-offline.yaml -n vss
#
# Repoints all 7 nvcr.io-sourced images at the GitLab Container Registry on
# the 1 TB box — a second, independent copy of the same images kept outside
# the cluster. Registry = 198.18.134.23:5050, project = root/model-images
# (self-signed / plain HTTP — needs an insecure registry entry wherever this
# is pulled from). Same pattern as the insurguard chart's values-offline.yaml.
# ============================================================================
