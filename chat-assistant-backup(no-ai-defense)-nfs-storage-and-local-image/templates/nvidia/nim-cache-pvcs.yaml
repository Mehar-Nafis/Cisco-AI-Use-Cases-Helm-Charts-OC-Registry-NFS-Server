{{- if .Values.nvidia.enabled }}
# ---------------------------------------------------------------------------
# NIM Model Cache PVCs
# These give each NIM pod a persistent volume for /opt/nim/.cache so that
# downloaded models survive pod restarts — avoiding the ~20-min re-download
# on every helm upgrade or pod crash.
# Sizes are configured in values.yaml under storage.nimCache.*
#
# The nfs.io/storage-path annotation pins each PVC to a fixed subdirectory
# name on the NFS export (understood by nfs-subdir-external-provisioner, see
# values-storage-nfs.yaml) so deleting and recreating a PVC always rebinds
# to the same on-disk data — without it, the provisioner falls back to a
# name embedding the auto-generated PV name, which differs every time,
# silently defeating the "survives helm uninstall" point of the NFS overlay.
# Harmless when NOT using the nfs-client StorageClass. Matches the
# insurguard chart's identical pattern.
# ---------------------------------------------------------------------------
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nim-cache-llama
  namespace: {{ .Values.namespace }}
  annotations:
    nfs.io/storage-path: "chat-assistant-noaidefense-nim-cache-llama"
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.storage.nimCache.llama }}
  {{- with (.Values.storage.modelCacheStorageClassName | default .Values.storage.storageClassName) }}
  storageClassName: {{ . }}
  {{- end }}
---
