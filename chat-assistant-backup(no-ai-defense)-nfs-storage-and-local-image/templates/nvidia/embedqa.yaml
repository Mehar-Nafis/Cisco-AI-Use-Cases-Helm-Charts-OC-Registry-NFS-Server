{{- if .Values.nvidia.enabled }}
{{- if and (not .Values.nvidia.embedqaIgnoreDownloadFail) (not .Values.ngc.apiKey) }}
{{ fail "embedqa needs nvidia.embedqaIgnoreDownloadFail or ngc.apiKey set. CONFIRMED live by reading this image's actual source (nimlib/model_manifest.py, nimlib/ngc/client.py, inside a throwaway pod running the real nv-embedqa-e5-v5 image): this NIM uses a completely different mechanism than llama/content/topicControl — no nim_llm_sdk, no NIM_MODEL_NAME local-path bypass (that field previously existed here and did nothing; removed). Its ModelManifest.download_models() unconditionally constructs an NGCClient (which makes a real NGC API call, e.g. get_org_names()/get_org_list()) BEFORE checking per-component cache — even with every model file already cached, this NGC touch always happens. nvidia.embedqaProfile alone does NOT avoid it either (profile selection is orthogonal to the client construction). The only two ways around it: nvidia.embedqaIgnoreDownloadFail sets NIM_IGNORE_MODEL_DOWNLOAD_FAIL=1, which nimutils.download_models's own try/except swallows that failure with (confirmed present in source) and proceeds using whatever's already on the cache PVC — same nvclip-style bypass insurguard needed, just via an env flag instead of a Triton adapter; or ngc.apiKey for genuine live access." }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedqa
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
    app: embedqa
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: embedqa
  template:
    metadata:
      labels:
        app: embedqa
        gpu-workload: "true"
        {{- include "chat-assistance.labels" . | nindent 8 }}
    spec:
      {{- include "chat-assistance.nodeSelector" . | nindent 6 }}
      {{- include "chat-assistance.nimAntiAffinity" . | nindent 6 }}
      {{- /* See llama.yaml's imagePullSecrets comment — same fix, decoupled
      from ngc.apiKey so satisfying the fail-fast guard via apiKey alone
      doesn't suppress the SA's auto-injected internal-registry credential. */}}
      {{- if .Values.ngc.ncrImagePull }}
      imagePullSecrets:
        - name: ncr-registry-secret
      {{- end }}
      containers:
        - name: embedqa
          image: {{ .Values.images.embedqa }}
          ports:
            - containerPort: 8000
          env:
            # See llama.yaml's NIM_CACHE_PATH comment — must match the
            # nim-cache mount below.
            - name: NIM_CACHE_PATH
              value: "/opt/nim/.cache"
            {{- if .Values.nvidia.embedqaIgnoreDownloadFail }}
            # Confirmed live via source (nimlib/nimutils.py's
            # get_ignore_model_download_fail/download_models): lets the
            # unconditional NGCClient() construction failure (see the guard
            # message above) be caught and ignored rather than crashing the
            # container, so startup proceeds using whatever's already on
            # the nim-cache PVC instead. Only safe to rely on once that PVC
            # is actually warm (bootstrap once with ngc.apiKey first).
            - name: NIM_IGNORE_MODEL_DOWNLOAD_FAIL
              value: "true"
            {{- end }}
            {{- if .Values.nvidia.embedqaProfile }}
            # Independent of the above — pins which profile gets selected,
            # doesn't by itself avoid the NGC client construction touch.
            - name: NIM_MODEL_PROFILE
              value: {{ .Values.nvidia.embedqaProfile | quote }}
            {{- end }}
            - name: NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ngc-api-secret
                  key: api-key
            - name: NIM_NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ngc-api-secret
                  key: api-key
          resources:
            {{- include "chat-assistance.resources.nvidia" . | nindent 12 }}
          securityContext:
            {{- include "chat-assistance.securityContext" . | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /v1/health/ready
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /v1/health/live
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
          volumeMounts:
            - name: nim-cache
              mountPath: /opt/nim/.cache
      volumes:
        - name: nim-cache
          persistentVolumeClaim:
            claimName: nim-cache-embedqa
---
apiVersion: v1
kind: Service
metadata:
  name: embedqa
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
spec:
  ports:
    - port: 8000
      targetPort: 8000
      name: llm
    - port : 80
      targetPort: 8000
      name: http-port
  selector:
    app: embedqa
{{- end }}
