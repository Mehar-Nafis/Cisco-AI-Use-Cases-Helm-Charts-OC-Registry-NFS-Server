{{- /* ngc.apiKey is now OPTIONAL (was `required`) — the 4 NIM images come
from the in-cluster nim-mirror by default (see values.yaml), not raw
nvcr.io, so no registry auth is needed for image pulls, and each NIM's
localModelPath (once set — see values.yaml comments) removes the runtime
NGC dependency too. Only ncr-registry-secret below (pure nvcr.io registry
auth, single-purpose) is conditional on ngc.apiKey — ngc-api-secret stays
UNCONDITIONAL: text-to-sql-agent.yaml and catalog-retriever.yaml also
consume it as LLM_API_KEY/EMBED_API_KEY for their own internal calls into
the NIMs, a genuinely different purpose unverified as safe to drop, so it
keeps existing (with an empty value when ngc.apiKey is unset) rather than
risk breaking those two backends. Each NIM still has its own fail-fast
guard requiring localModelPath, *Profile, or ngc.apiKey — mirrors the
pattern already used in the insurguard and vss-helm charts. */}}
{{- $ngcKey := .Values.ngc.apiKey -}}
{{- $dockerAuth := printf "%s:%s" .Values.ngc.registryUser $ngcKey | b64enc }}
{{- $dockerConfig := printf `{"auths":{"nvcr.io":{"username":"%s","password":"%s","auth":"%s"}}}` .Values.ngc.registryUser $ngcKey $dockerAuth }}
---
# ---------------------------------------------------------------------------
# Database credentials (Postgres, MongoDB, MinIO)
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: db-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
type: Opaque
stringData:
  # PostgreSQL
  POSTGRES_DB: {{ .Values.db.postgres.database | quote }}
  POSTGRES_USER: {{ .Values.db.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.db.postgres.password | quote }}
  # MongoDB
  MONGO_INITDB_DATABASE: {{ .Values.db.mongo.database | quote }}
  # MinIO
  MINIO_ROOT_USER: {{ .Values.db.minio.rootUser | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.db.minio.rootPassword | quote }}
  MINIO_ACCESS_KEY: {{ .Values.db.minio.accessKey | quote }}
  MINIO_SECRET_KEY: {{ .Values.db.minio.secretKey | quote }}
---
# ---------------------------------------------------------------------------
# NGC / NIM API key (used by all backend and NVIDIA services)
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: ngc-api-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-key: {{ $ngcKey | quote }}
---
{{- if $ngcKey }}
# ---------------------------------------------------------------------------
# NIM image pull secret for nvcr.io — only needed if a NIM image field is
# overridden back to a raw nvcr.io/... path; the default images now come
# from the in-cluster nim-mirror, no nvcr.io auth required.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: ncr-registry-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ $dockerConfig | b64enc }}
{{- end }}
